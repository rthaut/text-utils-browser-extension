name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  browser-extension:
    name: Browser extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test:firefox
