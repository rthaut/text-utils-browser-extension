name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  browser-extension:
    name: Browser extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run test:firefox
      - run: npm run build:edge

  permission-harness:
    name: Permission harness (chrome-mv3)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build:chrome
      # xvfb-run keeps the harness working even if it has to fall back to
      # headed mode (extensions require the new headless mode otherwise)
      - run: xvfb-run --auto-servernum -- node e2e/permission-harness.mjs
